<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가계부</title>
    <link rel="stylesheet" href="./styles/index.css" />
  </head>

  <body>
    <header class="header">
      <div class="header-left">
        <a href="./index.html" class="profile">
          <img src="./images/profile.jpg" alt="profile" />
        </a>
      </div>
      <div class="header-center">
        <h1>예원이의 가계부</h1>
      </div>
      <div class="header-right">
        <span>SOPT 38th WEB</span>
      </div>
    </header>
    <main>
      <!-- 검색 필터 -->
      <section class="filter-section">
        <h1 class="filter-heading">검색 필터</h1>

        <div class="filter-item title">
          <label>제목</label>
          <input type="text" placeholder="내역을 입력하세요" />
        </div>

        <div class="filter-item">
          <label>유형</label>
          <select>
            <option>전체</option>
            <option>수입</option>
            <option>지출</option>
          </select>
        </div>

        <div class="filter-item">
          <label>카테고리</label>
          <select>
            <option>전체</option>
            <option>교통</option>
            <option>문화</option>
            <option>생활</option>
            <option>식비</option>
            <option>월급</option>
            <option>기타</option>
          </select>
        </div>

        <div class="filter-item">
          <label>결제수단</label>
          <select>
            <option>전체</option>
            <option>신용카드</option>
            <option>체크카드</option>
            <option>현금</option>
          </select>
        </div>

        <div class="filter-actions">
          <button class="apply">적용</button>
          <button class="reset">초기화</button>
        </div>
      </section>

      <!-- 표 -->
      <section class="table-section">
        <div class="table-header">
          <select class="sort-select">
            <option value="desc">날짜 내림차순</option>
            <option value="asc">날짜 오름차순</option>
          </select>

          <div class="table-actions">
            <button id="deleteBtn">선택 삭제</button>
            <button id="addBtn">추가</button>
          </div>
        </div>

        <table class="expense-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="checkAll" /></th>
              <th>제목</th>
              <th>금액</th>
              <th>날짜</th>
              <th>카테고리</th>
              <th>결제수단</th>
            </tr>
          </thead>

          <tbody id="expense-body"></tbody>

          <tfoot>
            <tr>
              <td></td>
              <td>total</td>
              <td id="total-amount"></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
