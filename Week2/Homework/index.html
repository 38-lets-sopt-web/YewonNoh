<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가계부</title>
    <link rel="stylesheet" href="./styles/index.css" />
  </head>

  <body>
    <header class="header">
      <div class="header-left">
        <a href="./index.html" class="profile">
          <img src="./images/profile.jpg" alt="profile" />
        </a>
      </div>
      <div class="header-center">
        <h1>예원이의 가계부</h1>
      </div>
      <div class="header-right">
        <span>SOPT 38th WEB</span>
      </div>
    </header>
    <main>
      <!-- 검색 필터 -->
      <section class="filter-section">
        <h1 class="filter-heading">검색 필터</h1>

        <div class="filter-item title">
          <label>제목</label>
          <input type="text" placeholder="내역을 입력하세요" />
        </div>

        <div class="filter-item">
          <label>유형</label>
          <select>
            <option>전체</option>
            <option>수입</option>
            <option>지출</option>
          </select>
        </div>

        <div class="filter-item">
          <label>카테고리</label>
          <select>
            <option>전체</option>
          </select>
        </div>

        <div class="filter-item">
          <label>결제수단</label>
          <select>
            <option>전체</option>
          </select>
        </div>

        <div class="filter-actions">
          <button class="apply">적용</button>
          <button class="reset">초기화</button>
        </div>
      </section>
    </main>
  </body>
</html>
