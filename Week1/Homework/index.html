<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/index.css">
    <title>Yewon's Blog</title>
  </head>
  <body>
    <header>
      <img src="./image/profile.jpg" alt="profile">
      <div class="title">
        <h1>예원이의 블로그</h1>
        <p>환영합니다!</p>
      </div>
      <a href="https://github.com/nyewon" target="_blank">
        <img src="./image/github.png" alt="github">
      </a>
    </header>

    <main>
      <nav>
        <ul>
          <li><a href="#photo-dump">포토덤프</a></li>
          <li><a href="#like">좋아하는 것</a></li>
          <li><a href="#interest">내 관심사</a></li>
          <li><a href="#to-web">To. 웹왔니</a></li>
        </ul>
      </nav>

      <section id="photo-dump">
        <h2>📸 포토덤프</h2>
        <div class="gallery">
          <div><img src="./image/photo1.jpg" /></div>
          <div><img src="./image/photo2.jpg" /></div>
          <div><img src="./image/photo3.jpg" /></div>
          <div><img src="./image/photo4.jpg" /></div>
          <div><img src="./image/photo5.jpg" /></div>
          <div><img src="./image/photo6.jpg" /></div>
        </div>
      </section>

      <section id="like">
        <h2>♥️ 좋아하는 것: 고양이</h2>
        <div class="like-list">
          <div class="like-item"><img src="./image/cat1.jpeg" /></div>
          <div class="like-item"><img src="./image/cat2.jpeg" /></div>
          <div class="like-item"><img src="./image/cat3.jpeg" /></div>
          <div class="like-item"><img src="./image/cat4.jpeg" /></div>

          <div class="like-item"><img src="./image/cat4.jpeg" /></div>
          <div class="like-item"><img src="./image/cat5.jpeg" /></div>
        </div>
      </section>

      <section id="interest">
        <h2>💡 내 관심사</h2>
        <div class="card-list">
          <div class="card">
            <img src="./image/interest1.jpg" />
            <h3 class="title">🖼️ 전시</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
          <div class="card">
            <img src="./image/interest2.jpg" />
            <h3 class="title">🎬 영화</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
          <div class="card">
            <img src="./image/interest3.jpg" />
            <h3 class="title">🏃 운동</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
          <div class="card">
            <img src="./image/interest4.jpg" />
            <h3 class="title">🐻 소품샵 가기</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
          <div class="card">
            <img src="./image/interest5.jpg" />
            <h3 class="title">✈️ 여행</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
          <div class="card">
            <img src="./image/interest6.jpeg" />
            <h3 class="title">🍺 맥주</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
          <div class="card">
            <img src="./image/interest7.jpg" />
            <h3 class="title">🍜 라멘</h3>
            <div class="btn-group">
              <button class="like">좋아요</button>
              <button class="hate">싫어요</button>
            </div>
          </div>
        </div>

      <section id="to-web">
        <h2>🌍 To.웹왔니</h2>
        <div class="message-box">
          <p>웹왔니 여러분 모두 반가워요 !</p>
          <p>다같이 화이팅 해용 잘 부탁드립니다 !!!!</p>
        </div>
      </section>

    <footer>
      <p>읽어주셔서 감사합니다🥰</p>
    </footer>

</html>
